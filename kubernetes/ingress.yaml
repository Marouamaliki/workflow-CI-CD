apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microservices-ingress
spec:
  rules:
  - http:
      paths:
      - path: /service1
        pathType: Prefix
        backend:
          service:
            name: microservice1-service
            port:
              number: 80
      - path: /service2
        pathType: Prefix
        backend:
          service:
            name: microservice2-service
            port:
              number: 80