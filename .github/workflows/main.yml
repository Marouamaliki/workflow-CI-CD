  snyk_scan_sca:
    needs: lint_test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Snyk Test for Artifact #scanner 
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >-
            --all-projects
            --detection-depth=3
            --exclude=kubernetes,k8s,helm,infra,docker
            --severity-threshold=medium
            --json-file-output=snyk-report.json
      - name: Snyk Monitor #sychroniser avec serveur cloud
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: >-
            --all-projects
            --detection-depth=3
            --exclude=kubernetes,k8s,helm,infra,docker
      # - name: Upload Snyk Artifact #génération des artifacts
      #   uses: actions/upload-artifact@v4
      #   if: always()
      #   with:
      #     name: snyk-sca-report
      #     path: snyk-report.json
  build:
    needs: [sonarcloud_scan, snyk_scan_sca]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push microservices1
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/microservices1:latest ./microservices1
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/microservices1:latest

      - name: Build & Push microservices2
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/microservices2:latest ./microservices2
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/microservices2:latest
  scan_docker_images:
    needs: build
    runs-on: self-hosted
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        image: [microservices1, microservices2]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy scan
        run: |
          trivy image \
            --format sarif \
            --output trivy-${{ matrix.image }}.sarif \
            --severity CRITICAL,HIGH \
            --timeout 10m \
            --db-repository ghcr.io/aquasecurity/trivy-db \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4 
        if: always()
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: container-${{ matrix.image }}
  scan_iac:
    needs: scan_docker_images
    runs-on: self-hosted

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create venv
        run: python3 -m venv venv

      - name: Install Checkov
        run: |
          source venv/bin/activate
          pip install checkov

      - name: Run Checkov
        run: |
          source venv/bin/activate
          checkov -d kubernetes/ --output sarif --output-file-path checkov.sarif || true 


      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif
          category: iac-scan

      - name: Fail on HIGH severity
        continue-on-error: true 
        run: |
          HIGH=$(grep -c '"level":"high"' checkov.sarif || true)
          echo "HIGH severity issues: $HIGH"
          if [ "$HIGH" -gt 0 ]; then
            echo "::error::HIGH severity IaC issues detected"
            exit 1
          fi
      - name: Upload Checkov Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-iac-report
          path: checkov.sarif
  
  deploy:
    runs-on: self-hosted
    needs: scan_iac

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f kubernetes/ 
  zap_scan:
    needs: deploy
    runs-on: self-hosted
    permissions:
      security-events: write
      contents: read

    strategy:
      matrix:
        include:
          - name: microservices1
            app_url: http://192.168.49.2:3000
          - name: microservices2
            app_url: http://192.168.49.2:3002

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for app
        env:
          APP_URL: ${{ matrix.app_url }}
        run: |
          echo "Waiting for $APP_URL ..."

          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL" || echo "000")

            if [ "$status" = "200" ] || [ "$status" = "302" ]; then
              echo "App is up (HTTP $status)"
              exit 0
            fi

            echo "attempt $i: HTTP $status – retrying in 10s"
            sleep 10
          done

          echo "App did not become ready in time"
          exit 1

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ matrix.app_url }}
          cmd_options: "-T 60 -J zap-report.json -w zap-report.md -r zap-report.html"
          artifact_name: zap-report-${{ matrix.name }}

      - name: Fail on HIGH
        if: always()
        run: |
          if [ ! -f zap-report.json ]; then
            echo "ZAP report not found"
            exit 0
          fi

          HIGH=$(python3 - <<'PY'
          import json

          with open("zap-report.json") as f:
              data = json.load(f)

          alerts = data.get("site", [{}])[0].get("alerts", [])
          high = sum(1 for alert in alerts if alert.get("riskdesc", "").lower().startswith("high"))

          print(high)
          PY
          )

          echo "HIGH severity findings: $HIGH"

          if [ "$HIGH" -gt 0 ]; then
            echo "::error::ZAP found $HIGH HIGH-severity vulnerabilities."
            exit 1
          fi