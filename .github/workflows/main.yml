name: workflow CI/CD 
on: 
  push:
    branches : [main]
  pull_request:
    branches : [main]
jobs:
  lint_test: 
    runs-on: self-hosted
    strategy:
      matrix:
        service: [microservices1, microservices2]
    steps: 
      - name: checkout the code 
        uses: actions/checkout@v4
      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install Dependencies
        run: |
          cd ${{ matrix.service }}
          npm install
      - name: linting
        run: |
          cd ${{ matrix.service }}
          npm run lint
      - name: testing
        run: |
          cd ${{ matrix.service }}
          npm run test
