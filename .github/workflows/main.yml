name: Workflow CI Build & Push Images Microservices

on: 
  push:
    branches:
      - main
jobs:
  build-push:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN  }}
      - name: Build and Push microservices1
        run: 
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/microservices1:latest ./microservices1
          docker push  ${{ secrets.DOCKERHUB_TOKEN  }}/microservices1:latest

      - name: Build and Push microservices2
        run: 
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/microservices2:latest ./microservices2
          docker push  ${{ secrets.DOCKERHUB_TOKEN  }}/microservices2:latest
  
