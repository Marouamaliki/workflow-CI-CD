  snyk_scan_sca:
    needs: lint_test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      # ÉTAPE 1 : Test — forcé sur npm/yarn uniquement
      - name: Snyk Test for Artifact
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >-
            --all-projects
            --detection-depth=3
            --exclude=kubernetes,k8s,helm,infra,docker
            --severity-threshold=medium
            --json-file-output=snyk-report.json
        continue-on-error: true

      # ÉTAPE 2 : Monitor — exactement les mêmes args que le test
      - name: Snyk Monitor
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: >-
            --all-projects
            --detection-depth=3
            --exclude=kubernetes,k8s,helm,infra,docker