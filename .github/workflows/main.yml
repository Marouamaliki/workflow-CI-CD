name: workflow CI/CD 
on: 
  push:
    branches : [main]
  pull_request:
    branches : [main]
jobs:
  lint_test: 
    runs-on: self-hosted
    strategy:
      matrix:
        service: [microservices1, microservices2]
    steps: 
      - name: checkout the code 
        uses: actions/checkout@v4
      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install Dependencies
        run: |
          cd ${{ matrix.service }}
          npm install
      - name: linting
        run: |
          cd ${{ matrix.service }}
          npm run lint
      - name: testing
        run: |
          cd ${{ matrix.service }}
          npm run test
  sonarcloud_scan:
    needs: lint_test
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6.0.0
        with:
    args: >
      -Dsonar.projectKey=Marouamaliki_Apprentissage
      -Dsonar.organization=marouamaliki
      -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/.git/**,kubernetes/**
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"  

      - name: Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"
      - name: Download SonarCloud Report
        if: always()
        run: |
          curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=CI-CD-PIPELINE&organization=marouamaliki&resolved=false&ps=100" \
            -o sonarcloud-report.json

      - name: Upload SonarCloud Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonarcloud-report
          path: sonarcloud-report.json

