name: workflow CI/CD 
on: 
  push:
    branches : [main]
  pull_request:
    branches : [main]
jobs:
  lint_test: 
    runs-on: self-hosted
    strategy:
      matrix:
        service: [microservices1, microservices2]
    steps: 
      - name: checkout the code 
        uses: actions/checkout@v4
      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install Dependencies
        run: |
          cd ${{ matrix.service }}
          npm install
      - name: linting
        run: |
          cd ${{ matrix.service }}
          npm run lint
      - name: testing
        run: |
          cd ${{ matrix.service }}
          npm run test
  sast_test:
    needs: lint_test
    runs-on: self-hosted
    steps:
      - name: checkout the code 
        uses: actions/checkout@v4
      - name: Install Stable Sonar Scanner (Manual)
        run: |
          wget -q https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip -q sonar-scanner-cli-5.0.1.3006-linux.zip
          echo "$(pwd)/sonar-scanner-5.0.1.3006-linux/bin" >> $GITHUB_PATH

      - name: Run SonarQube Scan
        run: |
          sonar-scanner \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} 
        continue-on-error: false #pipeline stop in case of thechnical error not a vulnerability
      
  build:
    needs: sast_test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push microservices1
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/microservices1:latest ./microservices1
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/microservices1:latest

      - name: Build and Push microservices2
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/microservices2:latest ./microservices2
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/microservices2:latest
  
  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f kubernetes/       
