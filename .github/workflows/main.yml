  semgrep_scan:
    needs: lint_test
    runs-on: self-hosted
    permissions:
      contents: read
      security-events: write
    container: 
      image: semgrep/semgrep
    
    # On utilise l'image Docker officielle pour éviter les problèmes d'install Python
    steps:
      - name: checkout the code 
        uses: actions/checkout@v4
      
      - name: Run Semgrep CI
        run: semgrep ci --sarif --output=semgrep-results.sarif
     # Cette étape "pousse" le rapport vers l'onglet Security de GitHub
      - name: Upload SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() # On veut le rapport même si des failles sont trouvées
        with:
          sarif_file: 'semgrep-results.sarif'

      - name: Upload Semgrep Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-sast-report
          path: semgrep-results.sarif
